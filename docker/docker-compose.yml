services:
  cardioretina:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../checkpoints:/app/checkpoints
      - ../outputs:/app/outputs
      - ../evaluation_results:/app/evaluation_results
    env_file:
      - ../.env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - ENVIRONMENT=${ENVIRONMENT:-production}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

    # GPU support (uncomment if NVIDIA GPU is available):
