data:
  image_size: 224
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  num_workers: 4
  pin_memory: true

augmentation:
  rotation_limit: 15
  horizontal_flip: true
  vertical_flip: true
  brightness_limit: 0.2
  contrast_limit: 0.2
  gamma_limit: [0.8, 1.2]
  apply_clahe: true
  clahe_clip_limit: 2.0

model:
  backbone: efficientnet_b3
  pretrained: true
  num_clinical_features: 8
  clinical_hidden_dims: [64, 32]
  fusion_dims: [128, 64, 32]
  dropout_rate: 0.3
  fusion_dropout_rate: 0.4
  use_vit: true
  vit_model: vit_base_patch16_224
  vit_embed_dim: 768
  freeze_backbone_layers: true

training:
  batch_size: 16
  epochs: 50
  learning_rate: 0.001
  weight_decay: 0.0001
  optimizer: adam
  scheduler: reduce_on_plateau
  scheduler_patience: 5
  scheduler_factor: 0.5
  early_stopping_patience: 10
  gradient_clip_max_norm: 1.0
  mixed_precision: true
  seed: 42

output_dir: outputs
log_dir: logs
checkpoint_dir: checkpoints
